<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#24283b"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#2a2e42" stroke-width="2"/>
  <!-- Terminal prompt -->
  <text x="60" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="#9ece6a" font-weight="bold">~/dev</text>
  <!-- Code brackets -->
  <text x="60" y="58" text-anchor="middle" font-family="monospace" font-size="28" fill="#7aa2f7" font-weight="bold">&lt;/&gt;</text>
  <!-- Cursor -->
  <rect x="52" y="68" width="16" height="3" rx="1" fill="#c0caf5">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Dots -->
  <circle cx="35" cy="90" r="4" fill="#f7768e" opacity="0.8"/>
  <circle cx="50" cy="90" r="4" fill="#e0af68" opacity="0.8"/>
  <circle cx="65" cy="90" r="4" fill="#9ece6a" opacity="0.8"/>
  <circle cx="80" cy="90" r="4" fill="#7aa2f7" opacity="0.8"/>
</svg>
